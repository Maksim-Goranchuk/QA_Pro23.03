<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Генератор тестовых данных</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; padding: 2rem 1rem; }
.container { max-width: 780px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
.subtitle { font-size: 14px; color: #6b6b68; margin-bottom: 2rem; }
.card { background: #fff; border-radius: 12px; border: 1px solid #e2e1db; padding: 1.5rem; margin-bottom: 1rem; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
@media (max-width: 560px) { .form-grid { grid-template-columns: 1fr; } }
.field { display: flex; flex-direction: column; gap: 6px; }
label { font-size: 13px; font-weight: 500; color: #6b6b68; }
select, input[type="number"] { width: 100%; padding: 8px 12px; border: 1px solid #d8d7d1; border-radius: 8px; font-size: 14px; font-family: inherit; color: #1a1a18; background: #fff; outline: none; }
select:focus, input:focus { border-color: #888; }
select[multiple] { min-height: 120px; padding: 4px; }
select[multiple] option { padding: 5px 8px; border-radius: 4px; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 1.25rem; align-items: center; }
.btn-primary { background: #1a1a18; color: #fff; border: none; border-radius: 8px; padding: 9px 20px; font-size: 14px; font-family: inherit; cursor: pointer; }
.btn-primary:hover { opacity: 0.82; }
.btn-secondary { background: #fff; color: #1a1a18; border: 1px solid #d8d7d1; border-radius: 8px; padding: 9px 20px; font-size: 14px; font-family: inherit; cursor: pointer; }
.btn-secondary:hover { background: #f5f4f0; }
.seed-info { font-size: 12px; color: #9a9994; }
.results-card { background: #fff; border-radius: 12px; border: 1px solid #e2e1db; padding: 1.5rem; }
.empty-state { text-align: center; padding: 2rem; color: #9a9994; font-size: 14px; }
.results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.results-title { font-size: 14px; font-weight: 500; }
.results-count { font-size: 13px; color: #9a9994; }
.category-block { margin-bottom: 1.5rem; }
.category-block:last-child { margin-bottom: 0; }
.cat-title { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #9a9994; margin-bottom: 8px; }
.items-list { display: flex; flex-direction: column; gap: 5px; }
.item-row { background: #f8f7f4; border-radius: 8px; padding: 8px 12px; display: flex; align-items: center; gap: 10px; }
.item-val { font-family: 'SF Mono','Consolas','Monaco',monospace; font-size: 13px; color: #1a1a18; word-break: break-all; flex: 1; }
.item-empty { color: #9a9994; font-style: italic; }
.rand-badge { font-size: 10px; background: #f0eaff; color: #5b3fb5; border-radius: 4px; padding: 1px 5px; flex-shrink: 0; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; font-weight: 500; }
.tag-neg   { background: #FCEBEB; color: #A32D2D; }
.tag-bound { background: #FAEEDA; color: #854F0B; }
.tag-spec  { background: #EEEDFE; color: #3C3489; }
.tag-sec   { background: #EAF3DE; color: #3B6D11; }
.tag-pos   { background: #E6F1FB; color: #185FA5; }
.copy-btn { background: none; border: 1px solid #d8d7d1; border-radius: 6px; padding: 3px 10px; font-size: 12px; font-family: inherit; cursor: pointer; color: #6b6b68; flex-shrink: 0; }
.copy-btn:hover { background: #fff; border-color: #aaa; }
.copy-btn.copied { color: #3B6D11; border-color: #639922; }
</style>
</head>
<body>
<div class="container">
  <h1>Генератор тестовых данных</h1>
  <p class="subtitle">Каждая генерация уникальна — рандомизация защищает от эффекта пестицида</p>

  <div class="card">
    <div class="form-grid">
      <div class="field">
        <label for="fieldType">Тип поля</label>
        <select id="fieldType">
          <option value="text">Текстовое поле (имя, комментарий)</option>
          <option value="email">Email</option>
          <option value="password">Пароль</option>
          <option value="number">Числовое поле</option>
          <option value="date">Дата</option>
          <option value="phone">Телефон</option>
          <option value="url">URL</option>
          <option value="username">Логин / Username</option>
        </select>
      </div>
      <div class="field">
        <label for="locale">Язык / локаль данных</label>
        <select id="locale">
          <option value="mixed">Смешанный (рекомендован)</option>
          <option value="en">Только латиница</option>
          <option value="ru">Только кириллица</option>
          <option value="unicode">Unicode-экзотика</option>
        </select>
      </div>
    </div>
    <div class="form-grid">
      <div class="field">
        <label for="minLen">Минимальная длина поля</label>
        <input type="number" id="minLen" value="1" min="0" max="9999">
      </div>
      <div class="field">
        <label for="maxLen">Максимальная длина поля</label>
        <input type="number" id="maxLen" value="255" min="1" max="9999">
      </div>
    </div>
    <div class="form-grid">
      <div class="field">
        <label for="categories">Категории (можно выбрать несколько)</label>
        <select id="categories" multiple>
          <option value="positive" selected>Позитивные значения</option>
          <option value="boundary" selected>Граничные значения</option>
          <option value="negative" selected>Негативные / некорректные</option>
          <option value="special" selected>Спецсимволы и кодировки</option>
          <option value="security" selected>Безопасность (XSS, SQLi)</option>
        </select>
      </div>
      <div class="field">
        <label for="randLevel">Степень рандомизации</label>
        <select id="randLevel">
          <option value="low">Низкая — только перемешивание</option>
          <option value="med" selected>Средняя — часть данных случайна</option>
          <option value="high">Высокая — максимум уникальности</option>
        </select>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" id="generateBtn">⚡ Сгенерировать</button>
      <button class="btn-secondary" id="exportBtn" style="display:none">↓ Экспорт CSV</button>
      <span class="seed-info" id="seedInfo"></span>
    </div>
  </div>

  <div class="results-card">
    <div id="emptyState" class="empty-state">Настройте параметры и нажмите «Сгенерировать»</div>
    <div id="resultsHeader" class="results-header" style="display:none">
      <span class="results-title">Результаты</span>
      <span class="results-count" id="resultsCount"></span>
    </div>
    <div id="results"></div>
  </div>
</div>

<script>
// ─── rng ───────────────────────────────────────────────────────────────────────
// Simple seeded PRNG (mulberry32) so results are reproducible per seed
var _seed = Date.now();
function seedRng(s) { _seed = s >>> 0; }
function rng() {
  _seed += 0x6D2B79F5;
  var t = _seed;
  t = Math.imul(t ^ t >>> 15, t | 1);
  t ^= t + Math.imul(t ^ t >>> 7, t | 61);
  return ((t ^ t >>> 14) >>> 0) / 4294967296;
}
function randInt(a, b) { return a + Math.floor(rng() * (b - a + 1)); }
function pick(arr, n) {
  var a = arr.slice(), r = [];
  for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(rng() * (i+1)); var tmp = a[i]; a[i] = a[j]; a[j] = tmp; }
  return a.slice(0, Math.min(n, a.length));
}
function pickOne(arr) { return arr[Math.floor(rng() * arr.length)]; }
function repeat(s, n) { var o = ''; for (var i = 0; i < n; i++) o += s; return o; }

// ─── random string generators ──────────────────────────────────────────────────
var ALPHA_EN  = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
var ALPHA_RU  = 'абвгдеёжзийклмнопрстуфхцчшщъыьэюяАБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ';
var DIGITS    = '0123456789';
var SPECIAL   = '!@#$%^&*()_+-=[]{}|;:\'",.<>?/`~\\';
var UNICODE_CHARS = ['é','ñ','ü','ö','ä','ß','ø','å','æ','ç','ї','є','ő','ű','ž','š','č'];
var EMOJI_POOL    = ['😀','🎉','🔥','💡','🚀','❤️','✓','★','©','®','™','€','£','¥','§','¶'];

function randFrom(chars, n) {
  var o = '';
  for (var i = 0; i < n; i++) o += chars[Math.floor(rng() * chars.length)];
  return o;
}

function randString(n, locale) {
  switch (locale) {
    case 'ru':      return randFrom(ALPHA_RU + DIGITS + ' ', n);
    case 'en':      return randFrom(ALPHA_EN + DIGITS + ' ', n);
    case 'unicode': return randFrom(ALPHA_EN + UNICODE_CHARS.join('') + EMOJI_POOL.join(''), n);
    default: // mixed
      var pool = (rng() < 0.5 ? ALPHA_EN : ALPHA_RU) + DIGITS;
      return randFrom(pool, n);
  }
}

function randWord(locale) {
  var n = randInt(3, 10);
  return randString(n, locale);
}

function randEmail() {
  var users = ['user','test','admin','info','hello','ivan','maria','john','anna','support','dev','qa'];
  var domains = ['example.com','test.org','mail.ru','gmail.com','company.io','service.net'];
  var tlds = ['com','org','net','io','ru','de','fr','co.uk'];
  var u = pickOne(users) + (rng() < 0.5 ? String(randInt(1,999)) : '');
  var d = pickOne(['example','test','mysite','company','mail']) + '.' + pickOne(tlds);
  return u + '@' + d;
}

function randDate() {
  var y = randInt(1970, 2030);
  var m = randInt(1, 12);
  var daysInMonth = [31, (y%4===0?29:28), 31,30,31,30,31,31,30,31,30,31];
  var d = randInt(1, daysInMonth[m-1]);
  return y + '-' + (m<10?'0'+m:m) + '-' + (d<10?'0'+d:d);
}

function randPhone() {
  var patterns = [
    '+7' + randFrom(DIGITS, 10),
    '8' + randFrom(DIGITS, 10),
    '+1' + randFrom(DIGITS, 10),
    '+44' + randFrom(DIGITS, 10),
    '+49' + randFrom(DIGITS, 10)
  ];
  return pickOne(patterns);
}

function randUrl() {
  var schemes = ['https://', 'http://'];
  var hosts = ['example','test','myapp','service','api','shop','portal'];
  var tlds = ['.com','.org','.io','.net','.ru'];
  var paths = ['','/home','/about','/api/v1','/user/profile','/search?q=' + randFrom(ALPHA_EN,5)];
  return pickOne(schemes) + pickOne(hosts) + pickOne(tlds) + pickOne(paths);
}

function randUsername() {
  var prefixes = ['user','dev','test','ivan','john','anna','admin','guest'];
  var suffixes = ['_pro','_42','123','_dev','_qa','2024',''];
  return pickOne(prefixes) + pickOne(suffixes);
}

// ─── main generator ────────────────────────────────────────────────────────────
function buildCategory(type, cat, min, max, locale, randLevel) {
  var p = POOLS[type];
  if (!p) p = POOLS.text;

  // Граничные значения — логика одинакова для всех, но char рандомный
  if (cat === 'boundary') {
    // для числового типа — отдельная логика
    if (type === 'number') {
      var mid = Math.floor((min + max) / 2);
      var items = [
        { v: String(min - 1), label: 'Меньше минимума (' + (min-1) + ')' },
        { v: String(min), label: 'Ровно минимум (' + min + ')' },
        { v: String(min + 1), label: 'Минимум + 1 (' + (min+1) + ')' },
        { v: String(mid), label: 'Середина (' + mid + ')' },
        { v: String(max - 1), label: 'Максимум − 1 (' + (max-1) + ')' },
        { v: String(max), label: 'Ровно максимум (' + max + ')' },
        { v: String(max + 1), label: 'Превышение (' + (max+1) + ')' }
      ];
      if (randLevel !== 'low') {
        items.push({ v: String(randInt(min, max)), label: 'Случайное допустимое', rand: true });
        items.push({ v: String(randInt(min, max)), label: 'Случайное допустимое 2', rand: true });
      }
      return items;
    }
    // для дат — используем статичный пул + случайная дата
    if (type === 'date') {
      var base = p.boundary ? pick(p.boundary, 5) : [];
      if (randLevel !== 'low') base.push({ v: randDate(), label: 'Случайная корректная дата', rand: true });
      return base;
    }
    // для остальных — рандомный char, фиксированные длины
    var chars = ['A','B','а','ж','x','я','Z','1','@','#'];
    var filler = pickOne(chars);
    var result = [];
    var midLen = Math.floor((min + max) / 2);
    if (min > 0) {
      if (min > 1) result.push({ v: repeat(filler, min-1), label: 'Меньше минимума (' + (min-1) + ' симв.)' });
      result.push({ v: repeat(filler, min), label: 'Ровно минимум (' + min + ' симв.)' });
      if (min + 1 < max) result.push({ v: repeat(filler, min+1), label: 'Минимум + 1 (' + (min+1) + ' симв.)' });
    } else {
      result.push({ v: '', label: 'Пустая строка' });
      result.push({ v: ' ', label: '1 пробел' });
      result.push({ v: filler, label: '1 символ' });
    }
    if (midLen > min+1 && midLen < max-1)
      result.push({ v: repeat(filler, midLen), label: 'Середина (' + midLen + ' симв.)' });
    if (max > 2) result.push({ v: repeat(filler, max-1), label: 'Максимум − 1 (' + (max-1) + ' симв.)' });
    result.push({ v: repeat(filler, max), label: 'Ровно максимум (' + max + ' симв.)' });
    result.push({ v: repeat(filler, max+1), label: 'Превышение на 1 (' + (max+1) + ' симв.)' });
    if (randLevel !== 'low') {
      var rLen = randInt(Math.max(min,1), Math.min(max, 20));
      result.push({ v: randString(rLen, locale), label: 'Случайная строка (' + rLen + ' симв.)', rand: true });
    }
    return result;
  }

  // Позитивные
  if (cat === 'positive') {
    var pool, chosen;
    if (type === 'text') {
      pool = p.positive[locale] || p.positive.mixed;
      // фильтруем по длине
      var valid = pool.filter(function(s) { return s.length >= min && s.length <= max; });
      if (!valid.length) valid = pool;
      chosen = pick(valid, randLevel === 'high' ? 4 : 3).map(function(v) { return { v: v, label: 'Валидный ввод' }; });
    } else {
      pool = p.positive || [];
      chosen = pick(pool, randLevel === 'high' ? 4 : 3);
    }
    // добавляем рандомные
    if (randLevel !== 'low') {
      if (type === 'text') {
        var rLen3 = randInt(Math.max(min,1), Math.min(max, 15));
        chosen.push({ v: randString(rLen3, locale), label: 'Случайное валидное (' + rLen3 + ' симв.)', rand: true });
      }
      if (type === 'email')    chosen.push({ v: randEmail(), label: 'Случайный email', rand: true });
      if (type === 'date')     chosen.push({ v: randDate(), label: 'Случайная дата', rand: true });
      if (type === 'phone')    chosen.push({ v: randPhone(), label: 'Случайный телефон', rand: true });
      if (type === 'url')      chosen.push({ v: randUrl(), label: 'Случайный URL', rand: true });
      if (type === 'username') chosen.push({ v: randUsername(), label: 'Случайный логин', rand: true });
      if (type === 'password') {
        var specials = '!@#$%^&*';
        var rPass = randFrom(ALPHA_EN, 3).toUpperCase() + randFrom(ALPHA_EN, 3) + randFrom(DIGITS, 2) + pickOne(specials.split(''));
        chosen.push({ v: rPass, label: 'Случайный пароль', rand: true });
      }
      if (type === 'number') {
        var rNum = randInt(min, max);
        chosen = [
          { v: String(min), label: 'Минимум (' + min + ')' },
          { v: String(Math.floor((min+max)/2)), label: 'Среднее (' + Math.floor((min+max)/2) + ')' },
          { v: String(max), label: 'Максимум (' + max + ')' },
          { v: String(rNum), label: 'Случайное (' + rNum + ')', rand: true }
        ];
      }
    }
    return chosen;
  }

  // Негативные / special / security — перемешиваем пул и берём N штук
  var srcPool;
  if (cat === 'negative') srcPool = p.negative;
  if (cat === 'special') {
    srcPool = (type === 'text')
      ? (p.special[locale] || p.special.mixed).map(function(v) { return { v: v, label: 'Спецввод' }; })
      : p.special;
  }
  if (cat === 'security') srcPool = p.security || POOLS.text.security;

  if (!srcPool || !srcPool.length) return [];

  var n = randLevel === 'high' ? Math.min(srcPool.length, 8)
        : randLevel === 'med'  ? Math.min(srcPool.length, 6)
        : Math.min(srcPool.length, 5);

  var result2 = pick(srcPool, n);

  // при высокой рандомизации добавляем сгенерированные значения
  if (randLevel === 'high') {
    if (cat === 'negative' && type === 'text') {
      result2.push({ v: randFrom(SPECIAL, randInt(3,8)), label: 'Случайные спецсимволы', rand: true });
      result2.push({ v: repeat(' ', randInt(2,10)), label: 'Случайные пробелы', rand: true });
    }
    if (cat === 'special' && type === 'text') {
      var rMixed = randFrom(ALPHA_EN + ALPHA_RU + DIGITS + '!@# ', randInt(5, 15));
      result2.push({ v: rMixed, label: 'Случайный микс символов', rand: true });
    }
    if (cat === 'security') {
      // рандомно изменяем один из атак (меняем payload число)
      var n2 = randInt(2, 99);
      result2.push({ v: '<img src=' + n2 + ' onerror=alert(' + n2 + ')>', label: 'Вариация XSS #' + n2, rand: true });
    }
  }

  return result2;
}

// ─── ui helpers ───────────────────────────────────────────────────────────────
var catMeta = {
  positive: { label: 'Позитивные значения',       cls: 'tag-pos'   },
  boundary: { label: 'Граничные значения',         cls: 'tag-bound' },
  negative: { label: 'Негативные / некорректные', cls: 'tag-neg'   },
  special:  { label: 'Спецсимволы и кодировки',   cls: 'tag-spec'  },
  security: { label: 'Безопасность (XSS, SQLi)',  cls: 'tag-sec'   }
};

var generated = [];

function getSelected(id) {
  var el = document.getElementById(id), r = [];
  for (var i = 0; i < el.options.length; i++)
    if (el.options[i].selected) r.push(el.options[i].value);
  return r;
}

function escHTML(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function generate() {
  var type      = document.getElementById('fieldType').value;
  var min       = parseInt(document.getElementById('minLen').value) || 0;
  var max       = parseInt(document.getElementById('maxLen').value) || 255;
  var cats      = getSelected('categories');
  var locale    = document.getElementById('locale').value;
  var randLevel = document.getElementById('randLevel').value;
  if (min > max) min = 0;

  // новый seed на каждый клик
  var seed = Date.now() ^ Math.floor(Math.random() * 0xFFFFFF);
  seedRng(seed);
  document.getElementById('seedInfo').textContent = 'seed: ' + seed.toString(16);

  var source = POOLS[type] || POOLS.text;
  generated = [];
  var html = '';
  var total = 0;

  for (var c = 0; c < cats.length; c++) {
    var cat = cats[c];
    var meta = catMeta[cat];
    var items = buildCategory(type, cat, min, max, locale, randLevel);
    if (!items || !items.length) continue;

    html += '<div class="category-block"><p class="cat-title">' + meta.label + '</p><div class="items-list">';

    for (var i = 0; i < items.length; i++) {
      var val = items[i].v;
      var lbl = items[i].label;
      var isRand = items[i].rand;
      generated.push({ category: meta.label, value: val, description: lbl });
      total++;
      var displayHTML = (val === '')
        ? '<span class="item-empty">пустая строка</span>'
        : escHTML(val);
      html += '<div class="item-row">'
            + '<span class="item-val">' + displayHTML + '</span>'
            + (isRand ? '<span class="rand-badge">rand</span>' : '')
            + '<span class="tag ' + meta.cls + '">' + escHTML(lbl) + '</span>'
            + '<button class="copy-btn" data-idx="' + (generated.length-1) + '">копировать</button>'
            + '</div>';
    }
    html += '</div></div>';
  }

  document.getElementById('emptyState').style.display = 'none';
  if (!html) {
    document.getElementById('emptyState').style.display = '';
    document.getElementById('emptyState').textContent = 'Выберите хотя бы одну категорию';
    document.getElementById('results').innerHTML = '';
    document.getElementById('exportBtn').style.display = 'none';
    document.getElementById('resultsHeader').style.display = 'none';
    return;
  }
  document.getElementById('results').innerHTML = html;
  document.getElementById('resultsHeader').style.display = 'flex';
  document.getElementById('resultsCount').textContent = total + ' значений';
  document.getElementById('exportBtn').style.display = '';
}

document.getElementById('results').addEventListener('click', function(e) {
  var btn = e.target;
  if (!btn.classList.contains('copy-btn')) return;
  var idx = parseInt(btn.getAttribute('data-idx'));
  var val = generated[idx].value;
  function showCopied() {
    btn.textContent = '✓ скопировано';
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = 'копировать'; btn.classList.remove('copied'); }, 1400);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(val).then(showCopied);
  } else {
    var ta = document.createElement('textarea');
    ta.value = val; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showCopied();
  }
});

document.getElementById('generateBtn').addEventListener('click', generate);

document.getElementById('exportBtn').addEventListener('click', function() {
  var rows = [['Категория','Значение','Описание','Рандомное']];
  for (var i = 0; i < generated.length; i++)
    rows.push([generated[i].category, generated[i].value, generated[i].description, generated[i].rand ? 'да' : '']);
  var csv = rows.map(function(r) {
    return r.map(function(c) { return '"' + String(c).replace(/"/g,'""') + '"'; }).join(',');
  }).join('\n');
  var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'test_data.csv'; a.click();
});
